name: Deploy to GitHub Pages + COS

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # ── 部署到 GitHub Pages ──
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4

      # ── 同步到腾讯云 COS（Python SDK）──
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install COS SDK
        run: pip install cos-python-sdk-v5

      - name: Upload index.html to COS
        env:
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
        run: |
          python3 - <<'EOF'
          import os
          from qcloud_cos import CosConfig, CosS3Client

          secret_id  = os.environ['COS_SECRET_ID']
          secret_key = os.environ['COS_SECRET_KEY']
          region     = 'ap-shanghai'
          bucket     = 'wx-report-1309543112'

          config = CosConfig(Region=region, SecretId=secret_id, SecretKey=secret_key)
          client = CosS3Client(config)

          with open('index.html', 'rb') as f:
              client.put_object(
                  Bucket=bucket,
                  Body=f,
                  Key='index.html',
                  ContentType='text/html; charset=utf-8',
                  ContentDisposition='inline',
              )
          print('index.html 上传成功，Content-Type: text/html; charset=utf-8')
          EOF
